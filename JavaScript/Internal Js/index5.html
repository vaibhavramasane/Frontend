<!-- 5. Change Image on Click 
Description: Switch image when clicked.
Practice: src -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Toggle</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 50px;
  background: #f5f5f5;
}

.container {
  background: white;
  padding: 20px;
  width: 250px;
  margin: auto;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

img {
  width: 200px;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

img:hover {
  transform: scale(1.05);
}

p {
  margin-top: 10px;
  color: gray;
}
</style>
</head>

<body>

<div class="container">
  <img id="img" src="img1.png">
  <p>Click image to change</p>
</div>

<script>
let img = document.getElementById("img");

img.addEventListener("click", function(){
  img.src = img.src.includes("img1") ? "img2.png" : "img1.png";
});
</script>

</body>
</html>
