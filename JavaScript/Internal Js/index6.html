<!-- //6. Count Button Clicks -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Counter App</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 15px;
}

#count {
  font-size: 40px;
  margin: 20px 0;
  color: #333;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  background: #4facfe;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #007bff;
}
</style>
</head>

<body>

<div class="container">
  <h2>Counter</h2>
  <p id="count">0</p>
  <button onclick="count()">Click Me</button>
</div>

<script>
let c = 0;

function count(){
  c++;
  document.getElementById("count").innerText = c;
}
</script>

</body>
</html>
