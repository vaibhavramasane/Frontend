(<!-- 7. Add List Item 
Description: Add items dynamically to a list.  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            align-items: center;
            margin-top: 50px;
            background: f4f4f4f4;
        }

        input{
            padding: 10px;
            width: 200px;
            border: 1px solid #000;
            border-radius: 5px;
            

        }
        button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        
        }

        button:hover{
            background: #0056b3;
        }
    </style>
</head>
<body>
    <input id="text" name="str" type="text" value=""><br>
    <button type="submit" id="btw1">Submit</button>
    <button type="submit" id="btw2">Show List</button>

    <script type="text/javascript">
        let arr=[];
        let input = document.getElementById("text");
        let btw1= document.getElementById("btw1");
        let btw2= document.getElementById("btw2");

        btw1.addEventListener("click",function(){
            let value = input.value;

            if(value!==""){
                arr.push(value);
                input.value = "";
            }
        });

        btw2.addEventListener("click",function() {
            alert(arr);
        });
        
    </script>
    
</body>
</html>
