<!-- 9.Change Font Size -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id="btn" onclick="changefont()">Change Me</button>
    <p id="p">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Deleniti iste
      facere architecto itaque nam numquam velit, iusto commodi tempora
      delectus.
    </p>
    <script>
        function changefont(){

            let para = document.getElementById("p");
            para.style.fontSize="40px";
        }
    </script>
  </body>
</html>
