<html>
<head>
 <title> name validation</title>
 <script type='text/javascript'>
    function validateName(str)
	{   let span=document.getElementById("s");
	   if(str.length==0)
	   { span.innerHTML="name should not empty";
	     span.style.color="red";
	   }
	   else
	   {  let dcount=0,sacount=0,scount=0,calpha=0;
	      for(let i=0;i<str.length;i++)
		  { let ascii=str.charCodeAt(i);
			 if(ascii>=65 && ascii<=90)
			 {  ++calpha;
			 }
			 else if(ascii>=97 && ascii<=122)
			 { ++sacount;
			 }
			 else if(ascii>=48 && ascii<=57){
			    ++dcount;
			 }
			 else{
			    ++scount;
			 }
		  }
		  if(calpha>=1 &&sacount>=1 && dcount>=1&&scount>=1&&str.length>=8)
		  {
		    span.innerHTML="strong password";
			span.style.color="green";
		  }
		  else{
		    span.innerHTML="weak password";
			span.style.color="red";
		  }
		  
	   }
	}
 </script>
</head>
<body>
<input type='text' name='name' value='' id='n' 
style="width:400px;height:40px;" onkeyup="validateName(this.value)"/>
&nbsp;&nbsp;<span id="s"></span>
</body>
</html>
